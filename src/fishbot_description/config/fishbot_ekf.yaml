ekf_filter_node:
  ros__parameters:
    use_sim_time: true
    frequency: 30.0
    publish_tf: true
    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint  # 【关键】使用机器人的最底层根坐标系
    world_frame: odom

    # 【关键修改】：订阅 FAST_LIO 发布的 3D 里程计
    odom0: /Odometry
    odom0_config: [true,  true,  true,   # X, Y, Z
                   true,  true,  true,   # Roll, Pitch, Yaw
                   false, false, false,
                   false, false, false,
                   false, false, false]
    odom0_relative: false
    odom0_pose_rejection_threshold: 100.0
ekf_filter_node:
  ros__parameters:
    use_sim_time: true
    frequency: 50.0             # 【核心】以 50Hz 的高频发布 TF 树，满足 Nav2 局部规划器的需求
    sensor_timeout: 0.2
    two_d_mode: false           # RM 机器人可能会上坡，保持 3D 模式 (如果是纯平地，可设为 true 减少 Z 轴漂移)
    publish_tf: true            # 【核心】让 EKF 来发布 odom -> base_link
    publish_acceleration: false

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # 订阅 FAST-LIO 发布的高精度里程计话题
    odom0: /Odometry
    # [x, y, z, roll, pitch, yaw, vx, vy, vz, vroll, vpitch, vyaw, ax, ay, az]
    # 我们信任 FAST-LIO 的绝对姿态 (xyz, rpy)
    odom0_config: [true,  true,  true,
                   true,  true,  true,
                   false, false, false,
                   false, false, false,
                   false, false, false]
    odom0_queue_size: 10
    odom0_differential: false
    odom0_relative: false
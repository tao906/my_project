  ros__parameters:
    use_sim_time: True

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: True

controller_server:
  ros__parameters:
    use_sim_time: True
    odom_topic: /Odometry
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"] 
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0

    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25

    FollowPath:
      plugin: "teb_local_planner::TebLocalPlannerROS"
      odom_topic: /Odometry
      teb_autosize: 1.0
      dt_ref: 0.3
      dt_hysteresis: 0.1
      global_plan_viapoint_sep: 0.5 
      global_plan_prune_distance: 1.0
      
      max_global_plan_lookahead_dist: 2.5
      force_reinit_new_goal_dist: 1.0
      feasibility_check_no_poses: 2
      publish_feedback: True
      min_samples: 3
      max_samples: 150
      no_inner_iterations: 4
      no_outer_iterations: 3
      allow_init_with_backwards_motion: False 

      max_vel_x: 1.0           
      max_vel_x_backwards: 0.2 
      max_vel_theta: 1.0       # 【调整】：完美遵守 1.0 的最大转向限制
      acc_lim_x: 1.5           
      acc_lim_theta: 2.0       
      
      min_turning_radius: 0.0  
      footprint_model: 
        type: "circular"
        radius: 0.32           

      min_obstacle_dist: 0.1   
      inflation_dist: 0.45     
      include_costmap_obstacles: True
      costmap_obstacles_behind_robot_dist: 1.0
      obstacle_poses_affected: 30

      weight_max_vel_x: 2.0
      weight_max_vel_theta: 1.0
      weight_acc_lim_x: 1.0
      weight_acc_lim_theta: 1.0
      weight_kinematics_nh: 1000.0 
      weight_kinematics_forward_drive: 1.0
      weight_optimaltime: 5.0      
      weight_obstacle: 50.0        

      costmap_converter_plugin: "costmap_converter::CostmapToPolygonsDBSMCCH"
      costmap_converter_spin_thread: True
      costmap_converter_rate: 5.0
      
      costmap_converter/CostmapToPolygonsDBSMCCH:
        cluster_max_distance: 0.4
        cluster_min_pts: 2
        cluster_max_pts: 30
        convex_hull_min_pt_separation: 0.1

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: True
      rolling_window: true
      width: 6         # 【优化】：扩大局部地图为 6x6 米，给提速留足视野
      height: 6        
      resolution: 0.1 
      robot_radius: 0.32
      # 【核心升级】：引入工业级的 STVL 层
      plugins: ["stvl_layer", "inflation_layer"]
      
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 2.0      
        inflation_radius: 0.55      
        
      stvl_layer:
        plugin: "spatio_temporal_voxel_layer/SpatioTemporalVoxelLayer"
        enabled:                  true
        voxel_decay:              0.5          # 0.5秒后清除走动的动态障碍物残影
        decay_model:              0      
        voxel_size:               0.05   
        track_unknown_space:      true   
        mark_threshold:           0      
        update_footprint_enabled: true
        combination_method:       1      
        origin_z:                 -0.5         # 【修复】：下沉体素空间原点，包容FAST-LIO漂移
        publish_voxel_map:        true         # 【开启】：为 RViz 输出 voxel_grid 话题
        transform_tolerance:      0.5    
        mapping_mode:             false  
        map_save_duration:        60.0   
        observation_sources:      livox_mark livox_clear
        livox_mark:
          data_type: PointCloud2
          topic: /cloud_registered             # 【修改】：订阅 FAST-LIO 真实的 3D 点云
          marking: true
          clearing: false
          obstacle_range: 4.0            
          min_obstacle_height: -0.2            # 【修复】：下探20厘米，捕捉低矮障碍物
          max_obstacle_height: 2.0       
          expected_update_rate: 0.0      
          observation_persistence: 0.0   
          inf_is_valid: false            
          filter: "voxel"                
          voxel_min_points: 0            
          clear_after_reading: true      
        livox_clear:
          enabled: true                  
          data_type: PointCloud2
          topic: /cloud_registered       
          marking: false
          clearing: true
          max_z: 8.0                     
          min_z: -0.5                          # 【修复】：允许射线清空低于1米的动态障碍物
          vertical_fov_angle: 1.029      
          vertical_fov_padding: 0.05     
          horizontal_fov_angle: 6.29     
          decay_acceleration: 5.0        
          model_type: 1                  
          
      always_send_full_costmap: True

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: True
      robot_radius: 0.32
      resolution: 0.1
      track_unknown_space: true
      transform_tolerance: 1.0
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      
      # 全局地图继续使用 2D 的 /scan，降低长距离寻路的计算压力
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          min_obstacle_height: -0.5  
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
          
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 10.0      
        inflation_radius: 0.55         
      always_send_full_costmap: True

map_server:
  ros__parameters:
    use_sim_time: True
    yaml_filename: ""

map_saver:
  ros__parameters:
    use_sim_time: True
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True

planner_server:
  ros__parameters:
    expected_planner_frequency: 0.5
    use_sim_time: True
    planner_plugins: ["GridBased"] 
    
    GridBased:
      plugin: "fishbot_dlite_planner/DLitePlanner" 
      tolerance: 0.5
      use_potential_field: true     
      use_bspline_smoothing: true    
      use_field_dstar_interpolation: true
      use_turning_penalty: true      
      turning_penalty_weight: 2.0    
      obstacle_weight: 5.0 
      interpolation_resolution: 0.1

smoother_server:
  ros__parameters:
    use_sim_time: True
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.1
    use_sim_time: true
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0        # 【调整】：与 TEB 保持一致
    min_rotational_vel: 0.4
    rotational_acc_lim: 1.0

robot_state_publisher:
  ros__parameters:
    use_sim_time: True

waypoint_follower:
  ros__parameters:
    use_sim_time: True
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    use_sim_time: True
    smoothing_frequency: 20.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    max_velocity: [1.0, 0.0, 1.0]      # 【调整】：严格锁死底层转速为 1.0
    min_velocity: [-0.5, 0.0, -1.0]    
    max_accel: [1.5, 0.0, 2.0]        
    max_decel: [-1.5, 0.0, -2.0]     
    odom_topic: "/Odometry"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.05]
    velocity_timeout: 1.0
bt_navigator:
  ros__parameters:
    use_sim_time: True
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 50               # 降低行为树频率，释放CPU
    default_server_timeout: 20
    transform_tolerance: 1.0           # 允许TF延迟1秒，防止Extrapolation Error
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_is_battery_low_condition_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node

bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    use_sim_time: True

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: True

controller_server:
  ros__parameters:
    use_sim_time: True
    controller_frequency: 5.0      
    transform_tolerance: 1.0           # 允许控制器TF延迟1秒
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0

    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25

    FollowPath:
      plugin: "teb_local_planner::TebLocalPlannerROS"
      teb_autosize: 1.0
      dt_ref: 0.4                     # 提高时间分辨率
      dt_hysteresis: 0.1
      max_samples: 80                 # 匹配4.0m的前视距离
      global_plan_overwrite_orientation: True
      allow_init_with_backwards_motion: False
      max_global_plan_lookahead_dist: 4.0  # 提前4米进行绕行规划
      force_reinit_new_goal_dist: 1.0
      feasibility_check_no_poses: 5   
      exact_arc_length: False
      publish_feedback: False

      global_plan_viapoint_sep: 0.5
      via_points_ordered: False

      max_vel_x: 0.8                  # 🌟 保持最大线速度 0.8 m/s
      max_vel_x_backwards: 0.2
      max_vel_theta: 1.0              # 🌟 设置最大角速度 1.0 rad/s
      acc_lim_x: 0.4                  # 🌟 线加速度设为0.8（约1秒内从0加速到0.8m/s）
      acc_lim_theta: 1.0              # 🌟 角加速度设为1.0（约1秒内从0加速到1.0rad/s）
      is_footprint_dynamic: False
      use_proportional_saturation: False
      transform_tolerance: 0.5

      min_turning_radius: 0.0
      cmd_angle_instead_rotvel: False

      footprint_model: 
        type: "circular"
        radius: 0.32

      free_goal_vel: False

      # 高速避障与膨胀平衡
      min_obstacle_dist: 0.20         # 保持0.2米的绝对物理安全距离
      inflation_dist: 0.45            # 缩小软惩罚区，给予走廊高速通行自信
      dynamic_obstacle_inflation_dist: 0.6
      include_dynamic_obstacles: True
      include_costmap_obstacles: True
      legacy_obstacle_association: False
      costmap_obstacles_behind_robot_dist: 1.0
      obstacle_poses_affected: 20     # 让绕行轨迹更圆滑

      no_inner_iterations: 2          # 降低迭代次数，减轻CPU负担
      no_outer_iterations: 2          
      optimization_activate: True
      optimization_verbose: False
      penalty_epsilon: 0.15

      # 优化器激进权重调参
      weight_max_vel_x: 2.0
      weight_max_vel_theta: 1.0
      weight_acc_lim_x: 1.0
      weight_acc_lim_theta: 1.0
      weight_kinematics_nh: 500.0     
      weight_kinematics_forward_drive: 20.0 # 极力鼓励直线前进，拒绝画龙
      weight_kinematics_turning_radius: 0.0
      weight_optimaltime: 45.0        # 极高时间权重，要求用最快速度抵达
      weight_shortest_path: 0.0
      weight_obstacle: 50.0           
      weight_inflation: 0.8           # 降低膨胀区惩罚，允许在安全距离内擦肩而过
      weight_dynamic_obstacle: 10.0
      weight_dynamic_obstacle_inflation: 0.5
      weight_viapoint: 1.0
      weight_adapt_factor: 2.0

      enable_homotopy_class_planning: False
      enable_multithreading: True
      max_number_classes: 2

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0           
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: True
      rolling_window: true
      width: 6
      height: 6
      resolution: 0.05
      robot_radius: 0.32
      plugins: ["stvl_layer", "inflation_layer"]
      
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0      # 增加衰减陡度，越远离障碍物代价越小
        inflation_radius: 0.45        # 收紧局部膨胀半径
        
      stvl_layer:
        plugin: "spatio_temporal_voxel_layer/SpatioTemporalVoxelLayer"
        enabled:                  true
        voxel_decay:              3.0    
        decay_model:              0      
        voxel_size:               0.05   
        track_unknown_space:      true   
        mark_threshold:           0      
        update_footprint_enabled: true
        combination_method:       1      
        origin_z:                 -0.5
        publish_voxel_map:        true         
        transform_tolerance:      0.5    
        mapping_mode:             false  
        map_save_duration:        60.0   
        observation_sources:      livox_mark livox_clear
        livox_mark:
          data_type: PointCloud2
          topic: /cloud_registered_body  
          marking: true
          clearing: false
          obstacle_range: 4.0            
          min_obstacle_height: 0.20
          max_obstacle_height: 2.0       
          expected_update_rate: 0.0      
          observation_persistence: 0.0   
          inf_is_valid: false            
          filter: "voxel"                
          voxel_min_points: 0            
          clear_after_reading: true      
        livox_clear:
          enabled: true                  
          data_type: PointCloud2
          topic: /cloud_registered_body
          marking: false
          clearing: true
          max_z: 8.0                     
          min_z: 0.20 
          vertical_fov_angle: 1.029
          vertical_fov_padding: 0.05
          horizontal_fov_angle: 6.29
          decay_acceleration: 5.0
          model_type: 1

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0           # 降低全局地图刷新率，节约算力
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: True
      robot_radius: 0.32
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "stvl_layer", "inflation_layer"]
      
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
        
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0      # 增加衰减陡度
        inflation_radius: 0.55        # 收紧全局膨胀，留出宽阔规划通道
        
      stvl_layer:
        plugin: "spatio_temporal_voxel_layer/SpatioTemporalVoxelLayer"
        enabled:                  true
        voxel_decay:              10.0   
        decay_model:              0
        voxel_size:               0.05
        track_unknown_space:      true
        mark_threshold:           0
        update_footprint_enabled: true
        combination_method:       1
        origin_z:                 -0.5
        publish_voxel_map:        true
        transform_tolerance:      0.5
        mapping_mode:             false
        map_save_duration:        60.0
        observation_sources:      livox_mark livox_clear
        livox_mark:
          data_type: PointCloud2
          topic: /cloud_registered_body  
          marking: true
          clearing: false
          obstacle_range: 4.0
          min_obstacle_height: 0.20      
          max_obstacle_height: 2.0
          expected_update_rate: 0.0
          observation_persistence: 0.0
          inf_is_valid: false
          filter: "voxel"
          voxel_min_points: 0
          clear_after_reading: true
        livox_clear:
          enabled: true
          data_type: PointCloud2
          topic: /cloud_registered_body  
          marking: false
          clearing: true
          max_z: 8.0
          min_z: 0.20                    
          vertical_fov_angle: 1.029
          vertical_fov_padding: 0.05
          horizontal_fov_angle: 6.29
          decay_acceleration: 5.0
          model_type: 1
      always_send_full_costmap: True

map_saver:
  ros__parameters:
    use_sim_time: True
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True

planner_server:
  ros__parameters:
    expected_planner_frequency: 0.5   
    use_sim_time: True
    planner_plugins: ["GridBased"]
    
    GridBased:
      plugin: "fishbot_dlite_planner/DLitePlanner" 
      tolerance: 0.5
      use_potential_field: true     
      use_bspline_smoothing: true    
      use_field_dstar_interpolation: true
      use_turning_penalty: true      
      turning_penalty_weight: 2.0    
      obstacle_weight: 5.0 
      interpolation_resolution: 0.1

behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 2.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait", "assisted_teleop"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.5
    use_sim_time: True
    simulate_ahead_time: 1.0
    max_rotational_vel: 1.0             # 🌟 匹配新的TEB参数，允许行为树执行最高1.0 rad/s的旋转
    min_rotational_vel: 0.1
    rotational_acc_lim: 1.0             # 🌟 匹配角加速度到 1.0 rad/s²

map_server:
  ros__parameters:
    use_sim_time: True
    yaml_filename: ""

velocity_smoother:
  ros__parameters:
    use_sim_time: True
    smoothing_frequency: 10.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    max_velocity: [0.8, 0.0, 1.0]       # 🌟 底层最大速度匹配 [x: 0.8m/s, theta: 1.0rad/s]
    min_velocity: [-0.2, -0.0, -1.0]
    deadband_velocity: [0.0, 0.0, 0.05]
    velocity_timeout: 1.0
    max_accel: [0.4, 0.0, 1.0]          # 🌟 底层最大加速度匹配 [x: 0.8m/s², theta: 1.0rad/s²]
    max_decel: [-0.4, 0.0, -1.0]        # 🌟 底层最大减速度匹配（保证快速刹车和响应）
    odom_topic: "odom"
    odom_duration: 0.1